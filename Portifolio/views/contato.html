<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato | Ricardo Nelber</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/contato.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Ricardo <span>Nelber</span></div>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="sobre.html">Sobre</a></li>
      <li><a href="projetos.html">Projetos</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>
  </nav>
  <main>
    <section class="contato-section">
      <div class="contato-card">
        <h1>Contato</h1>
        <p>Entre em contato para oportunidades, duvidas ou parcerias.</p>

        <div class="contato-grid">
          <div class="contato-info">
            <div class="contato-info-item">
              <span>E-mail </span>
              <a href="mailto:ricardo.nelber.70@gmail.com">ricardo.nelber.70@gmail.com</a>
            </div>
            <div class="contato-info-item">
              <span>Disponibilidade</span>
              <strong>Projetos, Vagas de emprego e parcerias</strong>
            </div>
          </div>

          <form
            class="form-contato"
            action="#"
            method="post"
            autocomplete="off"
            data-webhook-url=""
            data-backend-ready="n8n-python-php"
          >
            <div class="form-group">
              <label for="nome">Nome</label>
              <input type="text" id="nome" name="nome" placeholder="Seu nome" minlength="2" maxlength="80" required>
            </div>
            <div class="form-group">
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" maxlength="120" required>
            </div>
            <div class="form-group">
              <label for="mensagem">Mensagem</label>
              <textarea id="mensagem" name="mensagem" rows="5" placeholder="Como posso ajudar? ou envie uma mensagem." minlength="10" maxlength="1200" required></textarea>
            </div>
            <p class="form-status" aria-live="polite"></p>
            <button type="submit" class="btn btn-neon">Enviar</button>
          </form>
        </div>
      </div>
    </section>
  </main>
  <script src="../assets/js/main.js"></script>
</body>
</html>
